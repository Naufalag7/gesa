<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Couple's Diary ✨🦋</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="fairy-dust"></div>
    
    <div class="butterfly b-fast">🦋</div>
    <div class="butterfly b-slow">🦋</div>
    <div class="bubble bin1">🫧</div>
    <div class="bubble bin2">✨</div>
    <div class="bubble bin3">🌸</div>

    <div class="container fade-in">
        <header class="shimmer-effect" id="main-header">
            <span class="magic-star">✨</span> Geisha <span class="magic-star">✨</span>
        </header>

        <div class="tab-parent">
            <button class="tab-btn active" onclick="switchUser('geisha', this)">✨ Geisha</button>
            <button class="tab-btn" onclick="switchUser('naufal', this)">💎 Naufal</button>
        </div>

        <div class="dashboard-grid">
            <div class="left-panel">
                <div class="summary-container">
                    <div class="summary-box blue glow-blue squish">
                        <span>Masuk</span>
                        <span id="total-masuk">...</span>
                    </div>
                    <div class="summary-box pink glow-pink squish">
                        <span>Keluar</span>
                        <span id="total-keluar">...</span>
                    </div>
                    <div class="summary-box yellow glow-yellow squish">
                        <span>Sisa</span>
                        <span id="sisa-saldo">...</span>
                    </div>
                </div>

                <div class="chart-section">
                    <canvas id="financeChart"></canvas>
                </div>

                <div class="love-counter squish">
                    <p>Days with Naufal 💖</p>
                    <h2 id="days-count">0</h2>
                </div>

                <div id="quote-display">Klik tombol 💖 untuk kejutan!</div>

                <div class="photo-frame squish">
                    <div class="pin">📌</div>
                    <div class="img-wrapper">
                        <img src="embroidery.png" alt="Us" id="couple-img" onerror="this.src='https://placehold.co/200x300/F4CFDF/7A5C69?text=Us+Forever'">
                    </div>
                    <p class="photo-caption" id="photo-text">I love you Geisha ✨</p>
                </div>
            </div>

            <div class="right-panel">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Tgl</th>
                                <th>Kat</th>
                                <th>Rp</th>
                                <th>Ket</th>
                            </tr>
                        </thead>
                        <tbody id="transaction-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="fab-heart pulse squish" onclick="heartBurst()">💖</div>

    <script src="script.js"></script>
</body>
</html>
